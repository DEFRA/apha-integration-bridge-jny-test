name: Run Journey Tests on GitHub

permissions:
  checks: write
  pull-requests: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - perf-test
          - prod
        default: dev
      debug:
        description: "Enable DEBUG logging"
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Run Journey Tests (${{ inputs.environment }})
    runs-on: ubuntu-latest

    env:
      # pass the chosen env into property/scenario resolution
      ENV_NAME: ${{ inputs.environment }}
      CUCUMBER_TAGS: ${{ inputs.environment }}
      DEBUG: ${{ inputs.debug && '1' || '' }}
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (npm run test:local)
        run: npm run test:local

      - name: Upload Cucumber JSON results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.5.0
        with:
          name: allure-results-${{ inputs.environment }}
          path: allure-results
          if-no-files-found: ignore

      - name: Generate HTML report
        if: always()
        run: npm run report

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.5.0
        with:
          name: allure-report-${{ inputs.environment }}
          path: allure-report
          if-no-files-found: ignore
