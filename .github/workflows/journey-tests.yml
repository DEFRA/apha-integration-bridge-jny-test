name: Run Journey Tests on GitHub

permissions:
  checks: write
  pull-requests: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - perf-test
          - prod
        default: dev
      debug:
        description: "Enable DEBUG logging"
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Run Journey Tests (${{ inputs.environment }})
    runs-on: ubuntu-latest

    env:
      # pass the chosen env into property/scenario resolution
      ENV_NAME: ${{ inputs.environment }}
      CUCUMBER_TAGS: ${{ inputs.environment }}
      DEBUG: ${{ inputs.debug && '1' || '' }}
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (npm run test:local)
        run: npm run test:local

      - name: Upload Cucumber JSON results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.5.0
        with:
          name: allure-results-${{ inputs.environment }}
          path: allure-results
          if-no-files-found: ignore

      - name: Generate HTML report
        if: always()
        run: npm run report

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.5.0
        with:
          name: allure-report-${{ inputs.environment }}
          path: allure-report
          if-no-files-found: ignore
